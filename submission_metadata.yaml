# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude (claude-sonnet-4-6)"

ai_usage_summary: |
  Used Claude for architecture discussion, scoring weight rationale, code review,
  and debugging. All engineering decisions, skill taxonomy design, honeypot
  detection logic, and final scoring weights are original work. No candidate
  data was fed to any LLM at any point.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker with six scoring components and a behavioural
  multiplier. The key insight from EDA: JD-critical skills (PyTorch, Milvus,
  BM25, QLoRA) appear ~1,300 times across 100K candidates vs. ~12,000 for
  noise skills (AWS, Docker) — rarity is the real signal.

  Six components (weights): role relevance 25%, skills match 25%,
  career description 20%, experience quality 15%, location 10%, notice 5%.

  The career_description component is the most novel: keyword analysis of
  career_history[].description fields surfaces whether a candidate actually
  shipped ranking/search/recommendation systems to real users — the JD's
  single hardest requirement. Keywords cover production signals (shipped,
  deployed, latency), retrieval/search (FAISS, BM25, semantic search, NDCG),
  and LLM work (fine-tuning, RAG, LoRA). Research signals (arxiv, paper,
  conference) are penalised.

  Behavioural multiplier [0.50, 1.25] weights activity recency (28%),
  OTW flag (18%), recruiter response rate (22%), interview completion (14%),
  GitHub activity (10%), profile completeness/verification (8%).

  Honeypot detection (5 signals): end-before-start dates, future end dates,
  duration mismatch >3 months, expert-rated skill with 0 months duration,
  ≥6 expert skills. 191 candidates flagged, all forced to score 0.

  Runtime: ~58 seconds for 100K candidates on CPU (well within 300s limit).
  Pure Python stdlib for the ranker; no external packages, no embeddings,
  no network calls during ranking.

